version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: openbrain
      POSTGRES_USER: openbrain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openbrain"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    build: ./mcp-server
    ports:
      - "3000:3000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Use individual DB config to handle passwords with special characters
      # DATABASE_URL is NOT set to avoid URL-encoding issues with special chars like # ! @
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: openbrain
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: openbrain
      OPEN_BRAIN_API_KEY: ${OPEN_BRAIN_API_KEY}
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
